services:
  api:
    build:
      context: ./backend
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      RENDER_STORAGE_ROOT: /data
      BLENDER_BINARY: /usr/local/bin/blender-wrapper
      BLENDER_CYCLES_DEVICE: AUTO
      BLENDER_GPU_ORDER: CUDA,OPTIX,CPU
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ADMIN_PANEL_PATH: ${ADMIN_PANEL_PATH:-control-tower}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-auto}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/data
      - ./backend/.blender-build_release_headless:/blender:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

  web:
    build:
      context: ./frontend
      args:
        BACKEND_ORIGIN: http://api:8000
        NEXT_PUBLIC_ADMIN_PANEL_PATH: ${ADMIN_PANEL_PATH:-control-tower}
    environment:
      BACKEND_ORIGIN: http://api:8000
      NODE_ENV: production
      NEXT_PUBLIC_ADMIN_PANEL_PATH: ${ADMIN_PANEL_PATH:-control-tower}
    ports:
      - "${WEB_PORT:-3100}:3000"
    depends_on:
      - api
